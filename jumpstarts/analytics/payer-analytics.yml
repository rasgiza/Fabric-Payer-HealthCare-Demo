id: 27   # TODO: confirm a unique unused id before PR (highest in registry today is 25; 26 reserved for payer-quickstart)
logical_id: payer-analytics
name: Tier-2 Payer Analytics Accelerator
description: >-
  Stand up a full payer analytics medallion in Fabric: 4 lakehouses, 35 gold
  tables across a star schema, a PayerAnalytics semantic model, 8 Foundry data
  agents (CFO, Stars, Risk, SIU, Care Management, Network, UM, Claims) routed
  through a Mission Control orchestrator, and a 7-page Power BI report. ETL is
  generated from raw sources (no pre-baked gold). Ships OneLake security roles,
  column masking, and Purview sensitivity labels (PHI / Financial) so payers
  get governed analytics out of the box.
date_added: 06/28/2026
