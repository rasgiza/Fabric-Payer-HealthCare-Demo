name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  citations:
    name: Citation linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pyyaml
        run: pip install pyyaml==6.0.2

      - name: Run citation linter
        run: python tools/check_citations.py
