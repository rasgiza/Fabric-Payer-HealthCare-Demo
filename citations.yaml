# Citation registry for the Fabric Payer Healthcare Demo.
#
# Every [CIT:<id>] reference in any markdown file in this repo MUST resolve to an
# entry below. Runs in CI via tools/check_citations.py.
#
# Schema per entry:
#   id                  Stable, UPPER-KEBAB. Used as [CIT:<id>] in markdown.
#   source              Issuing organization (e.g., CMS, NCQA, HFMA).
#   title               Document title.
#   url                 Public URL (required, non-empty).
#   year                Publication year as integer (required).
#   page_or_section     Page number, section number, or anchor (optional but preferred).
#   quote               Short quote / data point this citation supports (required, non-empty).
#   accessed            ISO date when last verified (YYYY-MM-DD).
#   topic               Free-text tag(s) for grouping in pain-point doc.
#   time_sensitive      true if this citation expires when a new annual edition drops
#                       (Stars Tech Notes, HEDIS spec, denial indices, RAF coefficients,
#                       fraud cost reports). Linter enforces year >= 2024 for these.

citations:

